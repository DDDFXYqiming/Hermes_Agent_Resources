name: language-router
version: 5.0.0
description: "Language Router Plugin v5.0 — Planner -> Worker -> Verifier -> Digest with Tree/Self-consistency/Cache/Budget + Multilingual Explorer + Dynamic Selector + Code-Switch Detector + Reward Evaluator"
author: "Diana (NousResearch)"
hooks:
  - pre_llm_call
  - pre_api_request
  - post_api_request
default_config:
  planner:
    enabled: true
    provider: null
    model: null
    temperature: 0.0
    max_tokens: 300
    timeout: 15
    disable_reasoning_if_supported: true
    confidence_threshold: 0.6
  reasoner:
    enabled: true
    provider: null
    model: null
    temperature: 0.0
    max_tokens: 1200
    timeout: 60
    default_thinking_language: en
    reasoning_effort: high
  verifier:
    enabled: auto
    provider: null
    model: null
    temperature: 0.0
    max_tokens: 700
    timeout: 45
    confidence_threshold: 0.75
  reasoning:
    enabled: true
    mode: auto
    allowed_modes:
      - "off"
      - simple
      - verify
      - self_consistency
      - tree
    self_consistency:
      enabled: true
      max_paths: 3
      trigger_tasks:
        - math
        - logic
        - complex_debug
    tree:
      enabled: true
      max_branches: 3
      pruning_threshold: 0.6
      trigger_tasks:
        - math
        - logic
        - complex_debug
        - architecture_design
    expose_raw_cot: false
    digest_only: true
  output:
    preserve_user_language: true
    respect_explicit_language_request: true
    fallback_language: en
  cache:
    enabled: true
    ttl_seconds: 300
    max_entries: 1000
    cache_plans: true
    cache_reasoning: false
  digest:
    max_tokens: 500
    include_plan_summary: true
    include_verifier_summary: true
    include_raw_notes: false
  debug:
    show_footer: false
    log_plan: true
    log_verifier: true
    log_digest_metadata: true
  latency_budget:
    enabled: true
    max_total_seconds: 90
    skip_verifier_if_budget_low: true
    skip_reasoner_if_budget_low: true
    degradation_thresholds:
      high: 0.7
      medium: 0.4
      low: 0.2
  # ── v5.0 新增配置 ──
  multilingual_explorer:
    enabled: true
    max_languages: 4
    trigger_tasks:
      - math
      - logic
      - complex_debug
    language_affinity:
      math: ["zh", "ja"]
      logic: ["de", "fr"]
      complex_debug: ["zh", "ja"]
      programming: ["en", "zh"]
  dynamic_selector:
    enabled: true
    learning_rate: 0.1
    initial_scores:
      en: 0.7
      zh: 0.6
      ja: 0.5
      de: 0.5
      fr: 0.5
  code_switching:
    enabled: true
    pattern_detection: true
    guidance_injection: true
  per_request_trigger:
    enabled: true
    lightweight_reminder: true
    max_latency_ms: 10
  reward_evaluator:
    enabled: true
    accuracy_weight: 0.5
    consistency_weight: 0.3
    fluency_weight: 0.2
    min_reward_threshold: 0.6
