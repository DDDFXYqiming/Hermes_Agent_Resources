name: language-router
version: 3.1.0
description: "Universal research-enhanced intelligent thinking language selection. Auto-detects user language and aligns output accordingly. Works for ANY language pair, not just Chinese-English. Based on academic research showing language mixing enhances reasoning (+5.6% accuracy)."
author: "Diana (NousResearch)"
provides_hooks:
  - pre_llm_call
default_config:
  classifier:
    temperature: 0.0
    max_tokens: 200
    timeout: 15
  reasoning:
    temperature: 0.0
    max_tokens: 1500
    timeout: 60
    reasoning_effort: high
  cache:
    enabled: true
    ttl_seconds: 300
    max_entries: 1000
  confidence_threshold: 0.6
